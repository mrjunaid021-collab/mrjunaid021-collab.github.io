<!DOCTYPE html>
<html>
<head>
    <title>Dezshiner</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            text-align: center;
        }

        header {
            background: black;
            color: white;
            padding: 60px 20px;
        }

        h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 4px;
        }

        header p {
            margin-top: 10px;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .section {
            padding: 60px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .grid img {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .grid img:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        a {
            text-decoration: none;
            color: white;
            background: black;
            padding: 12px 25px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        a:hover {
            background: #333;
        }

        footer {
            background: black;
            color: white;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<header>
    <h1>DEZSHINER</h1>
    <p>Fashion • Style • Identity</p>
</header>

<div class="section">
    <h2>About</h2>
    <p>Welcome to Dezshiner. A fashion brand focused on bold identity and modern street style.</p>
</div>

<div class="section">
    <h2>Gallery</h2>
    <div class="grid">
        <img src="firstpost.jpg">
        <img src="2ndpost.jpg">
        <img src="3rdpost.jpg">
        <img src="4thpost.jpg">
        <img src="5thpost.jpg">
    </div>
</div>

<div class="section">
    <h2>Contact</h2>
    <a href="https://instagram.com/_dezshiner_" target="_blank">Instagram</a>
</div>

<footer>
    © 2026 Dezshiner. All Rights Reserved.
</footer>

</body>
</html>
